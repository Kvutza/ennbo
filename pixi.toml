[workspace]
name = "ennbo"
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64", "linux-64"]

[feature.ennbo.dependencies]
python = "3.13.*"
git = "*"
rust = "*"
cmake = "*"
ninja = "*"
maturin = "*"
numpy = "*"
scipy = "*"
pytest = "*"
pytest-xdist = "*"
ruff = "*"
nbmake = "*"
pandas = "*"
matplotlib = "*"
libfaiss = { version = "1.10.*", build = "cpu*" }

[feature.ennbo.target.linux-64.dependencies]
c-compiler = "*"
cxx-compiler = "*"

[feature.ennbo.target.linux-64.activation.env]
CC = "$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-cc"
CXX = "$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-c++"

[feature.ennbo.pypi-dependencies]
ennbo = { path = ".", editable = true }

[feature.ennbo.target.osx-arm64.activation.env]
KMP_DUPLICATE_LIB_OK = "TRUE"
OMP_NUM_THREADS = "1"
MKL_NUM_THREADS = "1"
OPENBLAS_NUM_THREADS = "1"
VECLIB_MAXIMUM_THREADS = "1"
DYLD_LIBRARY_PATH = "$CONDA_PREFIX/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}"
RUSTFLAGS = "-C link-arg=-framework -C link-arg=Accelerate"

[feature.ennbo.tasks]
test = "python -m pytest -q tests/test_candidate_gen_direct.py tests/test_raasp_candidates.py tests/parity/test_rust_config_passthrough.py"
develop = "maturin develop --release --features metal,opencl"
develop-metal = "maturin develop --release --features metal"
develop-opencl = "maturin develop --release --features opencl"
test-trials = "python -m pytest -q tests/test_weight_search.py"
test-trials-metal = "cargo test --manifest-path rust/Cargo.toml -q -p ennbo --test trial_search --features metal"
test-trials-opencl = "cargo test --manifest-path rust/Cargo.toml -q -p ennbo --test trial_search --features opencl"

[environments]
ennbo = { features = ["ennbo"], no-default-feature = true }
