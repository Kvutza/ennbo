[package]
name = "ennbo"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Epistemic Nearest Neighbor Bayesian Optimization"
readme = "README.md"

[features]
# Modal images ship no linkable `libfaiss_c`; build Faiss from source (static) and set
# `CMAKE_TOOLCHAIN_FILE` to `cmake/faiss_blas_toolchain.cmake` for BLAS discovery.
modal = ["faiss/static"]

[dependencies]
faiss = { version = "0.13.0" }
ndarray = { workspace = true }
ndarray-linalg = { workspace = true }
rand = "0.8"
sobol = "1.0.2"
thiserror = { workspace = true }

[dev-dependencies]
approx = "0.5"
numpy = "0.22"
rand_chacha = "0.3"
